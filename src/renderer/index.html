<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicPost Naver Writer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="appShell">
      <header class="appHeader">
        <div>
          <h1>PicPost Naver Writer</h1>
          <p>이미지 기반 포스팅을 생성하고 네이버 블로그 글쓰기 화면에 입력합니다.</p>
        </div>
        <div class="headerActions">
          <button type="button" id="loginButton" class="ghostButton">네이버 로그인</button>
          <button type="button" id="writeButton" class="ghostButton">글쓰기 열기</button>
          <button type="button" id="closeButton" class="dangerButton">브라우저 닫기</button>
        </div>
      </header>

      <nav class="stepper" aria-label="작성 단계">
        <button type="button" class="stepButton isActive" data-step-target="0">1 업로드</button>
        <button type="button" class="stepButton" data-step-target="1">2 이미지 편집</button>
        <button type="button" class="stepButton" data-step-target="2">3 포스팅 기획</button>
        <button type="button" class="stepButton" data-step-target="3">4 생성 결과</button>
        <button type="button" class="stepButton" data-step-target="4">5 네이버 입력</button>
      </nav>

      <section class="stagePanel" data-step="0">
        <div class="creditBanner">
          <span class="creditIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9z" />
              <path d="M18.5 14.5l.8 1.9 1.9.8-1.9.8-.8 1.9-.8-1.9-1.9-.8 1.9-.8z" />
            </svg>
          </span>
          <div class="creditText">
            <strong>크레딧 이월 가능</strong>
            <p>유료 플랜 크레딧은 다음 달로 이월됩니다.</p>
            <div class="creditProgress"><span></span></div>
          </div>
        </div>

        <div class="optionCard">
          <div class="panelHeader compactHeader">
            <div>
              <h2>생성 방식 선택</h2>
            </div>
            <span class="infoIcon" title="생성 방식을 선택하세요" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" /><path d="M12 11v5" /><path d="M12 8h.01" /></svg>
            </span>
          </div>
          <div class="modeGrid">
            <button type="button" class="modeCard isSelected" id="normalModeButton">
              <span class="modeIcon dark" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z" /></svg>
              </span>
              <span class="modeCheck" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" /><path d="M8.5 12.5l2.5 2.5 4.5-5" /></svg>
              </span>
              <strong>일반 생성</strong>
              <span>쉽고 빠른 자동 생성</span>
              <em>기본 AI 모델</em>
            </button>
            <button type="button" class="modeCard isDisabled" disabled>
              <span class="modeIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z" /></svg>
              </span>
              <strong>전문가 생성</strong>
              <em class="accent">고급 AI 모델</em>
            </button>
          </div>
        </div>

        <div class="optionCard">
          <div class="panelHeader compactHeader">
            <div>
              <h2>이미지 선택 <span id="imageCountBadge" class="countBadge">0/30</span></h2>
            </div>
            <span class="infoIcon" title="JPG, JPEG, PNG, GIF, WebP 형식만 사용할 수 있습니다" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" /><path d="M12 11v5" /><path d="M12 8h.01" /></svg>
            </span>
          </div>
          <section id="dropZone" class="dropZone" aria-label="이미지 드롭 영역">
            <span class="uploadIcon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4" /><path d="M7 9l5-5 5 5" /><path d="M5 20h14" /></svg>
            </span>
            <strong>이미지를 드래그하거나 클릭하여 선택하세요</strong>
            <span>JPG, JPEG, PNG, GIF, WebP 형식 · 최대 30장</span>
          </section>

          <div class="uploadActions">
            <button type="button" id="pickImagesButton" class="ghostButton">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4" /><path d="M7 9l5-5 5 5" /><path d="M5 20h14" /></svg>
              이미지만 업로드
            </button>
          </div>
        </div>
      </section>

      <section class="stagePanel" data-step="1" hidden>
        <div class="editorLayout">
          <aside class="sideDrop">
            <h2>편집 도구</h2>
            <section id="editorDropZone" class="dropZone compact" aria-label="이미지 추가 드롭 영역">
              <strong>이미지 드래그</strong>
              <span>여기에 놓기</span>
            </section>
          </aside>
          <section class="imageEditor">
            <div class="panelHeader">
              <div>
                <h2>이미지 <span id="editorImageCount" class="countBadge">0/30</span></h2>
                <p>순서와 설명을 편집하세요.</p>
              </div>
              <div class="inlineActions">
                <button type="button" id="reverseImagesButton" class="ghostButton">순서 뒤집기</button>
                <button type="button" id="addMoreImagesButton" class="ghostButton">이미지 추가</button>
              </div>
            </div>
            <div id="imageGrid" class="imageGrid"></div>
          </section>
        </div>
      </section>

      <section class="stagePanel" data-step="2" hidden>
        <div class="planningGrid">
          <label>
            글쓴이 설정
            <input id="writerProfile" type="text" placeholder="예: 맛집 블로거, 동네 리뷰어" />
          </label>
          <label>
            글의 말투
            <input id="tone" type="text" placeholder="예: 친근하고 정중하게" />
          </label>
          <label>
            타깃 독자
            <input id="targetAudience" type="text" placeholder="예: 가족 외식 장소를 찾는 30대" />
          </label>
          <label>
            주제
            <input id="topic" type="text" placeholder="예: 인천 대게 맛집 방문 후기" />
          </label>
          <label>
            업체명/장소/상품
            <input id="storeInfo" type="text" placeholder="예: 연안부두 대게집" />
          </label>
          <label>
            SEO 키워드
            <input id="seoKeyword" type="text" placeholder="예: 인천 대게 맛집" />
          </label>
          <label class="wideField">
            요청사항
            <textarea id="seoNotes" rows="5" placeholder="반드시 포함할 내용, 피해야 할 표현, 구성 요청 등을 입력하세요."></textarea>
          </label>
        </div>
      </section>

      <section class="stagePanel" data-step="3" hidden>
        <div class="panelHeader">
          <div>
            <h2>생성 결과</h2>
            <p id="generationSummary">아직 생성 요청이 없습니다.</p>
          </div>
          <div class="inlineActions">
            <button type="button" id="generateButton" class="primaryButton">포스트 생성</button>
            <button type="button" id="refreshResultButton" class="ghostButton">새로고침</button>
          </div>
        </div>
        <section class="resultEditor fullResultEditor">
          <label>
            제목
            <input id="resultTitle" type="text" placeholder="생성 후 제목이 표시됩니다." />
          </label>
          <label>
            본문
            <textarea id="resultBody" rows="24" placeholder="생성 결과가 그대로 표시됩니다. image_1, image_2 위치에 해당 이미지가 순서대로 입력됩니다."></textarea>
          </label>
          <label>
            태그
            <textarea id="resultTags" rows="3" placeholder="쉼표 또는 줄바꿈으로 구분"></textarea>
          </label>
        </section>
      </section>

      <section class="stagePanel" data-step="4" hidden>
        <div class="naverPanel">
          <label>
            네이버 Blog ID
            <input id="blogId" type="text" autocomplete="off" placeholder="myblogid" />
          </label>
          <div class="naverActions">
            <button type="button" id="copyOutputButton" class="ghostButton">출력 복사</button>
            <button type="button" id="testFillButton" class="ghostButton">🧪 테스트 입력</button>
            <button type="button" id="submitToNaverButton" class="primaryButton">네이버에 입력</button>
          </div>
        </div>
      </section>

      <footer class="footerNav">
        <button type="button" id="prevStepButton" class="ghostButton">이전</button>
        <button type="button" id="nextStepButton" class="primaryButton">다음</button>
      </footer>

      <section class="statusBar">
        <div class="statusSummary">
          <strong>상태</strong>
          <span id="latestStatus">대기 중입니다.</span>
        </div>
        <button type="button" id="toggleLogButton" class="ghostButton">로그 보기</button>
        <ol id="statusList" hidden></ol>
      </section>
    </main>

    <script src="./draftModel.js"></script>
    <script src="./filePathView.js"></script>
    <script src="./statusLog.js"></script>
    <script src="./devFixture.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
